name: Release

# Builds the Wails desktop app on Ubuntu (WebKitGTK 4.1), packages a .deb whose
# name matches what the in-app updater downloads
# (asmgr-desktop_<version>_linux_x86_64.deb), and publishes a GitHub Release.
#
# Triggers:
#   - pushing a tag like v0.5.0  → automatic release for that tag
#   - manual run (workflow_dispatch) with a version input → tags + releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.6.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # For a manual run, create and push the tag first so the release attaches to it.
      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}" || true
          git push origin "${{ github.event.inputs.version }}" || true

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "num=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential pkg-config \
            portaudio19-dev \
            xorg-dev \
            libx11-dev libx11-xcb-dev libxtst-dev libxcb1-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxcb-xkb-dev \
            libxinerama-dev libxrandr-dev libxt-dev \
            xvfb

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build (Wails, webkit2_41)
        # Wails' "generating bindings" step runs the app's Go init() code, and a
        # dependency (robotn/gohook, global hotkey) calls XOpenDisplay on init —
        # which segfaults on a headless runner. Run the build under a virtual X
        # server (Xvfb) so a display exists during binding generation.
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          xvfb-run -a wails build -tags webkit2_41 -clean

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Package .deb and .rpm (names match the in-app updater)
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          export VERSION="${{ steps.ver.outputs.num }}"
          # nfpm's arch is 'amd64', but the OUTPUT names use x86_64 to match
          # updater/updater.go (BinaryName_version_linux_x86_64.{deb,rpm}).
          nfpm package -f build/nfpm.yaml -p deb -t \
            "asmgr-desktop_${VERSION}_linux_x86_64.deb"
          nfpm package -f build/nfpm.yaml -p rpm -t \
            "asmgr-desktop_${VERSION}_linux_x86_64.rpm"
          ls -la *.deb *.rpm

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            asmgr-desktop_${{ steps.ver.outputs.num }}_linux_x86_64.deb
            asmgr-desktop_${{ steps.ver.outputs.num }}_linux_x86_64.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # macOS build. Wails uses the native WKWebView here (NO webkit2_41 tag).
  # CGO is required (portaudio/CoreAudio, gohook/Cocoa). The Linux job owns the
  # tag; this job only builds and uploads its assets to the same release.
  # NOTE: tmux is still required at runtime (install via Homebrew). Dictation
  # bits that are Linux-only (PulseAudio, uinput) fall back to no-op stubs.
  release-macos:
    name: Build & Release (macOS)
    needs: release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "num=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (PortAudio)
        run: brew install portaudio

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build (Wails, macOS arm64)
        # Build arm64 only: the macos-14 runner is Apple Silicon and Homebrew's
        # portaudio is arm64-only, so a universal build fails to link the x86_64
        # slice. Intel Macs run the arm64 build under Rosetta 2.
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build -platform darwin/arm64 -clean

      - name: Package .tar.gz (name matches the in-app updater)
        run: |
          V="${{ steps.ver.outputs.num }}"
          tar -C build/bin -czf "asmgr-desktop_${V}_darwin_arm64.tar.gz" "asmgr-desktop.app"
          ls -la *.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            asmgr-desktop_${{ steps.ver.outputs.num }}_darwin_arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Windows build. Wails uses the native WebView2 (no webkit2_41 tag). CGO is
  # required (portaudio); we get a gcc toolchain + portaudio via MSYS2.
  # NOTE: the app shells out to `tmux` at runtime, which native Windows does not
  # have — users need it on PATH (e.g. via WSL/MSYS2/Git Bash). This build makes
  # the binary available; full functionality still depends on tmux.
  release-windows:
    name: Build & Release (Windows)
    needs: release
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2 (gcc + portaudio)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-portaudio

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "num=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build (Wails, Windows amd64)
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          export CGO_ENABLED=1
          wails build -platform windows/amd64 -clean

      - name: Package .tar.gz (name matches the in-app updater)
        run: |
          V="${{ steps.ver.outputs.num }}"
          tar -C build/bin -czf "asmgr-desktop_${V}_windows_amd64.tar.gz" "asmgr-desktop.exe"
          ls -la *.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            asmgr-desktop_${{ steps.ver.outputs.num }}_windows_amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
