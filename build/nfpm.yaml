# nfpm packaging config for the .deb / .rpm produced in CI.
# The file name template MUST match what updater/updater.go downloads:
#   asmgr-desktop_<version>_linux_x86_64.deb
# (BinaryName=asmgr-desktop; amd64 -> x86_64).
name: asmgr-desktop
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: izll
vendor: izll
homepage: https://github.com/izll/agent-session-manager-desktop
license: MIT
description: |
  Agent Session Manager (desktop GUI) — manage multiple AI coding-agent
  sessions (Claude, Gemini, Aider, Codex, …) side by side. Wails + Svelte +
  xterm.js.

# Runtime dependencies. WebKitGTK 4.1 + tmux are required. The WebKit package is
# named differently per distro, so override per format (deb vs rpm).
depends:
  - tmux

overrides:
  deb:
    depends:
      - libwebkit2gtk-4.1-0
      - tmux
  rpm:
    depends:
      - webkit2gtk4.1
      - tmux

contents:
  - src: ./build/bin/asmgr-desktop
    dst: /usr/bin/asmgr-desktop
    file_info:
      mode: 0755
  - src: ./build/appicon.png
    dst: /usr/share/icons/hicolor/512x512/apps/asmgr-desktop.png
  - src: ./build/asmgr-desktop.desktop
    dst: /usr/share/applications/asmgr-desktop.desktop
